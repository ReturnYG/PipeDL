name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Resolve version
        shell: pwsh
        run: |
          if ("${{ github.ref_type }}" -eq "tag") {
            $version = "${{ github.ref_name }}".TrimStart("v")
          } else {
            $version = "0.1.0-dev"
          }
          "PIPEDL_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Build Windows installer
        shell: pwsh
        run: .\scripts\build_windows.ps1 -Version "$env:PIPEDL_VERSION"

      - name: Package portable zip
        shell: pwsh
        run: |
          Compress-Archive -Path dist\PipeDL,dist\pipedl.exe -DestinationPath "dist\PipeDL-portable-$env:PIPEDL_VERSION.zip"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: PipeDL-windows-${{ env.PIPEDL_VERSION }}
          path: |
            dist/installer/*.exe
            dist/*.zip

      - name: Create GitHub release
        if: github.ref_type == 'tag'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" `
            dist/installer/*.exe `
            dist/*.zip `
            --title "PipeDL $env:PIPEDL_VERSION" `
            --notes "Download PipeDL-Setup-$env:PIPEDL_VERSION.exe to install PipeDL on Windows. The portable zip is provided for users who prefer not to run an installer."
